services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rooms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rooms}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  conference-mock:
    build: .
    command: ["/usr/local/bin/conference-mock"]
    environment:
      CONFERENCE_MOCK_PORT: ${CONFERENCE_MOCK_PORT:-8090}
      CONFERENCE_MOCK_FAIL_RATE: ${CONFERENCE_MOCK_FAIL_RATE:-0}
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    command: ["/usr/local/bin/api"]
    environment:
      HTTP_PORT: ${HTTP_PORT:-8080}
      DATABASE_URL: ${APP_DATABASE_URL:-postgres://postgres:postgres@db:5432/rooms?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      SLOT_HORIZON_DAYS: ${SLOT_HORIZON_DAYS:-7}
      CONFERENCE_SERVICE_URL: ${CONFERENCE_SERVICE_URL:-http://conference-mock:8090}
      CONFERENCE_TIMEOUT_MS: ${CONFERENCE_TIMEOUT_MS:-1500}
      DUMMY_ADMIN_USER_ID: ${DUMMY_ADMIN_USER_ID:-11111111-1111-1111-1111-111111111111}
      DUMMY_USER_USER_ID: ${DUMMY_USER_USER_ID:-22222222-2222-2222-2222-222222222222}
    depends_on:
      db:
        condition: service_healthy
      conference-mock:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  postgres_data: